experiment:
  name: "wad_internvl3_training_traj_dual"
  version: "1.0"
  description: "InternVL2-2B with Q-Former trajectory dual conditioning"
  tags: ["internvl2", "navigation", "mllm", "trajectory", "dual"]

model:
  architecture: "internvl"
  name: "OpenGVLab/InternVL2_5-2B"
  trust_remote_code: true
  multimodal_max_length: 8192

  qformer:
    enabled: true
    source_model: "Salesforce/instructblip-flan-t5-xl"
    cache_dir: "./qformer_cache"
    num_query_tokens: 32
    freeze_qformer: true
    freeze_mlp1: true
    prompt_aware: true
    max_text_length: 128
    train_lora_llm: true
    bridge_mode: "prompt_aware_preproj_mlp1"

  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "wqkv"
      - "wo"
      - "w1"
      - "w2"
      - "w3"
    bias: "none"
    task_type: "CAUSAL_LM"

  quantization:
    enabled: true
    bits: 4
    type: "nf4"
    double_quant: true
    compute_dtype: "bfloat16"

  vision:
    freeze_encoder: true
    min_pixels: 256
    max_pixels: 1280
    image_size: [448, 448]

trajectory:
  enabled: true
  fusion_mode: "dual"
  source_file: "json"
  num_objects: 6
  d_cat: 32
  d_numeric_hidden: 64
  d_traj: 384
  num_heads: 4
  num_layers: 4
  ffn_dim: 768

data:
  name: "minhdang0901/WAD_Images_All_Size"
  num_frames: 1
  train_split: 0.9
  seed: 42
  response_format: "direct_text"
  alter_only: true

training:
  output_dir: "./outputs/internvl3_2b_traj_dual"
  num_epochs: 5
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  proj_learning_rate: 5e-4
  warmup_steps: 200
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  fp16: false
  gradient_checkpointing: true
  optimizer: "adamw_bnb_8bit"
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 2000
  save_steps: 2000
  save_total_limit: 2
  resume_dir: null
  start_epoch: 0
  start_step: 0
  log_token_stats: true
  token_log_batches: 5
  debug_dataset_stats: true
  debug_dataset_samples: 2

evaluation:
  metrics: ["exact_match", "field_accuracy"]
  batch_size: 1

hardware:
  device: "cuda"
  num_workers: 0
  pin_memory: false
  cuda_alloc_conf: "expandable_segments:True"

tracking:
  enabled: true
  backend: "mlflow"
  project_name: "wad-vlm"
  log_model: true
