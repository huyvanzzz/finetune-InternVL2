experiment:
  name: "wad_sailvl_training"
  version: "1.0"
  description: "SAIL-VL-1.5-2B alter-only with prompt-aware Q-Former"
  tags: ["sailvl", "navigation", "alter_only"]

model:
  architecture: "sailvl"
  name: "BytedanceDouyinContent/SAIL-VL-1d5-2B"
  trust_remote_code: true
  multimodal_max_length: 8192

  qformer:
    enabled: true
    source_model: "Salesforce/instructblip-flan-t5-xl"
    cache_dir: "./qformer_cache"
    num_query_tokens: 32
    freeze_qformer: true
    freeze_mlp1: true
    prompt_aware: true
    max_text_length: 128
    bridge_mode: "prompt_aware_preproj_mlp1"

  lora:
    enabled: true
    r: 16
    alpha: 32
    dropout: 0.05
    target_modules:
      - "q_proj"
      - "k_proj"
      - "v_proj"
      - "o_proj"
      - "gate_proj"
      - "up_proj"
      - "down_proj"
    bias: "none"
    task_type: "CAUSAL_LM"

  quantization:
    enabled: true
    bits: 4
    type: "nf4"
    double_quant: true
    compute_dtype: "bfloat16"

  vision:
    freeze_encoder: true
    force_image_size: 448
    use_thumbnail: true
    min_dynamic_patch: 1
    max_dynamic_patch: 12

data:
  name: "minhdang0901/WAD_Images_All_Size"
  num_frames: 1
  train_split: 0.9
  seed: 42
  train_task_filter: "alter_only"
  val_task_filter: "alter_only"
  eval_limit: 0
  response_format: "direct_text"
  direct_text_alter_prompt_mode: "balanced_v1"

training:
  output_dir: "./outputs/sailvl_1d5_2b"
  num_epochs: 5
  batch_size: 2
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  proj_learning_rate: 5e-4
  warmup_steps: 200
  warmup_ratio: 0.03
  weight_decay: 0.01
  bf16: true
  fp16: false
  gradient_checkpointing: true
  optimizer: "adamw_bnb_8bit"
  lr_scheduler: "cosine"
  max_grad_norm: 1.0
  logging_steps: 10
  eval_strategy: "steps"
  eval_steps: 2000
  save_steps: 2000
  save_total_limit: 2
  task_balancing:
    enabled: false
    qa_weight: 0.25
    alter_weight: 0.75
  resume_dir: null
  start_epoch: 0
  start_step: 0
  log_token_stats: true
  token_log_batches: 5
  log_prompt_samples: true
  prompt_log_batches: 2

evaluation:
  metrics: ["exact_match", "field_accuracy"]
  batch_size: 4

hardware:
  device: "cuda"
  num_workers: 0
  pin_memory: false
  cuda_alloc_conf: "expandable_segments:True"

tracking:
  enabled: true
  backend: "mlflow"
  project_name: "wad-vlm"
  log_model: true
